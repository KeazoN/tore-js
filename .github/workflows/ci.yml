name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build CLI bundle
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Smoke test CLI (Node)
        run: node dist/cli.mjs check

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Unit tests (Bun)
        run: bun test
